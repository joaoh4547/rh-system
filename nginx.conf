worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Suporte a WebSocket (Vaadin Push)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Sticky sessions por IP de origem: o estado da UI do Vaadin vive na sessão
    # HTTP, então cada cliente precisa sempre cair na mesma instância.
    # (O cache Hazelcast é compartilhado; só a sessão exige afinidade.)
    upstream rh_system {
        ip_hash;
        server app1:8080 max_fails=3 fail_timeout=15s;
        server app2:8080 max_fails=3 fail_timeout=15s;
    }

    server {
        listen 80;

        # Uploads de documentos
        client_max_body_size 50m;

        location / {
            proxy_pass http://rh_system;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Conexões push de longa duração
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
