spring:
  application:
    name: rh-system

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:rh_system}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false
    use-code-as-default-message: false

  # SMTP do Gmail. Use uma "Senha de app" do Google (não a senha normal da conta).
  # Configure as variáveis MAIL_USERNAME e MAIL_PASSWORD no ambiente.
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.rhsystem: DEBUG

# Configurações da aplicação
rh-system:
  # URL base usada para montar o link de ativação enviado por email
  base-url: ${APP_BASE_URL:http://localhost:8080}
  # Remetente dos emails
  mail-from: ${MAIL_FROM:${MAIL_USERNAME:no-reply@rhsystem.com}}
  # Validade do token de ativação em horas
  ativacao-token-validade-horas: ${ATIVACAO_TOKEN_HORAS:24}
  # Diretório onde os anexos dos usuários serão armazenados
  storage-dir: ${STORAGE_DIR:./storage/documentos}
