# Toda a configuração vem do arquivo .env (copie de .env.example).
# `${VAR:?...}` interrompe o start com erro claro se a variável faltar.

# Configuração comum às duas instâncias da aplicação
x-app-common: &app-common
  build: .
  image: rh-system:local
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
  # Todas as variáveis da aplicação vêm do .env
  env_file: .env
  volumes:
    - app_storage:${STORAGE_DIR:?defina STORAGE_DIR no .env}
  healthcheck:
    test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
    interval: 15s
    timeout: 5s
    retries: 10
    start_period: 90s

services:
  postgres:
    image: postgres:17-alpine
    container_name: rh-system-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:?defina DB_NAME no .env}
      POSTGRES_USER: ${DB_USER:?defina DB_USER no .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?defina DB_PASSWORD no .env}
    # Faz o Postgres escutar na porta definida no .env (consistente com as apps)
    command: -p ${DB_PORT:?defina DB_PORT no .env}
    ports:
      - "${DB_PORT_HOST:?defina DB_PORT_HOST no .env}:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -p ${DB_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app1:
    <<: *app-common
    container_name: rh-system-app1

  app2:
    <<: *app-common
    container_name: rh-system-app2

  # Load balancer (nginx) na frente das duas instâncias
  lb:
    image: nginx:1.27-alpine
    container_name: rh-system-lb
    restart: unless-stopped
    ports:
      - "${LB_PORT:?defina LB_PORT no .env}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy

volumes:
  postgres_data:
  app_storage:
